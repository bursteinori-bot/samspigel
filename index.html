<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סם שפיגל — דשבורד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --bg-base: #09090F;
  --bg-surface: #11111C;
  --bg-surface2: #191928;
  --bg-glass: rgba(255,255,255,0.04);
  --accent: #7C6FF7;
  --accent-glow: rgba(124,111,247,0.35);
  --pink: #FF6B9D;
  --teal: #00E5CC;
  --gold: #FFD166;
  --text-1: #F0F0FA;
  --text-2: #8080A0;
  --text-3: #404060;
  --urg-overdue: #FF4757;
  --urg-soon: #7CB9FF;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.16);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 999px;
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);

  /* status colors */
  --s-none: #404060;
  --s-todo: #6FBBF7;
  --s-inprogress: #FFD166;
  --s-submitted: #00E5CC;
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Heebo', sans-serif;
  direction: rtl;
  background: var(--bg-base);
  color: var(--text-1);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select {
  font-family: inherit; color: var(--text-1); background: var(--bg-surface2);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 12px; outline: none; width: 100%;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
a { color: var(--accent); text-decoration: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

/* ===== TOPBAR ===== */
#topbar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: rgba(9,9,15,0.9);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.logo { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
.logo span { color: var(--accent); }
.search-wrap {
  flex: 1; max-width: 320px; position: relative;
}
.search-wrap input {
  padding: 7px 36px 7px 12px;
  border-radius: var(--radius-xl);
  font-size: 0.83rem;
  background: var(--bg-surface);
}
.search-wrap::before {
  content: '🔍'; position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; pointer-events: none; opacity: 0.5;
}
.topbar-right { display: flex; gap: 6px; margin-right: auto; align-items: center; }
.topbar-btn {
  padding: 6px 13px; border-radius: var(--radius-sm);
  background: var(--bg-surface); border: 1px solid var(--border);
  font-size: 0.8rem; transition: all 0.2s var(--ease); white-space: nowrap; color: var(--text-2);
}
.topbar-btn:hover { border-color: var(--border-hover); color: var(--text-1); }
#btn-add-task {
  background: var(--accent); border-color: var(--accent); color: #fff;
  font-weight: 600; box-shadow: 0 4px 16px var(--accent-glow);
  transition: transform 0.2s var(--spring), box-shadow 0.2s;
}
#btn-add-task:hover { transform: scale(1.05); box-shadow: 0 6px 24px var(--accent-glow); }

/* ===== MAIN LAYOUT ===== */
#app {
  flex: 1;
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: 0;
  overflow: hidden;
}

/* ===== LEFT SIDEBAR ===== */
#sidebar {
  display: flex; flex-direction: column; gap: 0;
  border-left: 1px solid var(--border);
  overflow: hidden;
}

/* ===== KPI ROW ===== */
#kpi-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  flex-shrink: 0;
}
.kpi-card {
  padding: 14px 16px;
  background: var(--bg-surface);
  cursor: default;
  transition: background 0.15s;
}
.kpi-card:hover { background: var(--bg-surface2); }
.kpi-num {
  font-size: 1.9rem; font-weight: 800; line-height: 1;
  letter-spacing: -1px;
}
.kpi-label { font-size: 0.7rem; color: var(--text-3); margin-top: 3px; font-weight: 500; }
.kpi-card.kpi-open .kpi-num { color: var(--accent); }
.kpi-card.kpi-soon .kpi-num { color: var(--urg-soon); }
.kpi-card.kpi-lessons .kpi-num { color: var(--gold); }
.kpi-card.kpi-done .kpi-num { color: var(--teal); }

/* ===== TASK LIST ===== */
#tasks-panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  border-top: 1px solid var(--border);
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  flex-shrink: 0;
}
.panel-title {
  font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-3);
}
.panel-count {
  font-size: 0.7rem; font-weight: 600;
  background: var(--bg-surface2); color: var(--text-2);
  padding: 2px 8px; border-radius: var(--radius-xl);
}
#task-list {
  flex: 1; overflow-y: auto; padding: 0 10px 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.task-item {
  padding: 10px 12px; border-radius: var(--radius-md);
  background: var(--bg-surface); border: 1px solid var(--border);
  transition: all 0.2s var(--ease);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.task-item::before {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px;
  background: var(--task-color, var(--text-3));
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.task-item:hover { border-color: var(--border-hover); background: var(--bg-surface2); }
.task-item.is-overdue { border-color: rgba(255,71,87,0.3); }
.task-item.is-overdue::before { background: var(--urg-overdue); }
.task-title { font-size: 0.83rem; font-weight: 500; margin-bottom: 5px; line-height: 1.35; }
.task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-course-tag {
  font-size: 0.65rem; padding: 2px 7px; border-radius: var(--radius-xl);
  color: var(--task-color, var(--text-3));
  background: color-mix(in srgb, var(--task-color, var(--text-3)) 15%, transparent);
  font-weight: 600;
}
.task-due { font-size: 0.67rem; color: var(--text-3); }
.task-due.due-overdue { color: var(--urg-overdue); font-weight: 600; }
.task-due.due-soon { color: var(--urg-soon); }
.task-status-pill {
  font-size: 0.62rem; font-weight: 600; padding: 2px 7px; border-radius: var(--radius-xl);
  margin-right: auto;
}
.task-actions-row {
  display: flex; gap: 4px; margin-top: 7px;
  opacity: 0; transition: opacity 0.15s;
}
.task-item:hover .task-actions-row { opacity: 1; }
.task-action-btn {
  padding: 3px 8px; border-radius: var(--radius-sm);
  font-size: 0.68rem; background: var(--bg-surface2);
  border: 1px solid var(--border); color: var(--text-2);
  transition: all 0.15s;
}
.task-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.task-action-btn.submit { border-color: rgba(0,229,204,0.3); color: var(--teal); }
.task-action-btn.submit:hover { background: rgba(0,229,204,0.1); }
.task-action-btn.danger:hover { border-color: rgba(255,71,87,0.4); color: var(--urg-overdue); }
.task-empty {
  text-align: center; padding: 30px 16px;
  font-size: 0.8rem; color: var(--text-3);
}

/* ===== PINBOARD ===== */
#pin-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.pin-strip {
  display: flex; gap: 8px; overflow-x: auto; padding: 8px 12px;
  scroll-snap-type: x mandatory;
}
.pin-strip::-webkit-scrollbar { height: 3px; }
.pin-card {
  flex: 0 0 auto; min-width: 140px; max-width: 200px;
  padding: 9px 12px; border-radius: var(--radius-md);
  background: var(--bg-surface2); border: 1px solid var(--border);
  font-size: 0.75rem; scroll-snap-align: start;
  cursor: pointer; transition: all 0.2s var(--ease);
  position: relative;
}
.pin-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
.pin-card-title { font-weight: 600; margin-bottom: 2px; }
.pin-card-sub { font-size: 0.67rem; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pin-card-del {
  position: absolute; top: 4px; left: 6px;
  font-size: 0.65rem; opacity: 0; transition: opacity 0.15s;
  color: var(--text-3);
}
.pin-card:hover .pin-card-del { opacity: 1; }
.pin-card.pin-red { border-right: 3px solid #FF4757; }
.pin-card.pin-yellow { border-right: 3px solid var(--gold); }
.pin-card.pin-green { border-right: 3px solid var(--teal); }
.pin-card.pin-blue { border-right: 3px solid var(--urg-soon); }
.pin-countdown-days { font-size: 0.9rem; font-weight: 800; color: var(--accent); }
.pin-countdown-bar { height: 3px; background: var(--bg-base); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.pin-countdown-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.pin-add-btn {
  flex: 0 0 auto; min-width: 36px; height: 100%;
  display: flex; align-items: center; justify-content: center;
  border: 1px dashed var(--border); border-radius: var(--radius-md);
  color: var(--text-3); font-size: 1.2rem;
  padding: 9px 10px;
  transition: all 0.2s;
}
.pin-add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ===== CALENDAR PANEL ===== */
#cal-panel {
  display: flex; flex-direction: column; overflow: hidden;
}
#cal-toolbar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  background: var(--bg-surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; transition: all 0.2s;
}
.cal-nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
#cal-range { font-size: 0.85rem; font-weight: 600; min-width: 130px; }
#cal-today-btn {
  padding: 4px 12px; border-radius: var(--radius-xl);
  background: var(--accent); color: #fff; font-size: 0.75rem; font-weight: 600;
  transition: all 0.2s;
}
#cal-today-btn:hover { transform: scale(1.05); }
.cal-search-wrap { margin-right: auto; }
.cal-search-wrap input {
  padding: 5px 12px; border-radius: var(--radius-xl);
  font-size: 0.78rem; width: 140px;
}

/* ===== 3-DAY GRID ===== */
#cal-body {
  flex: 1; display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0; overflow: hidden;
}
.cal-day {
  display: flex; flex-direction: column; overflow: hidden;
  border-left: 1px solid var(--border);
}
.cal-day:last-child { border-left: none; }
.cal-day-hdr {
  flex-shrink: 0; padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}
.cal-day-hdr .day-name { font-size: 0.7rem; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.cal-day-hdr .day-date { font-size: 1.2rem; font-weight: 800; line-height: 1.2; }
.cal-day-hdr.is-today { background: color-mix(in srgb, var(--accent) 12%, var(--bg-surface)); }
.cal-day-hdr.is-today .day-date { color: var(--accent); }
.cal-day-hdr.is-today .day-name { color: color-mix(in srgb, var(--accent) 70%, var(--text-3)); }
.cal-day-events { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }

/* ===== EVENT CARDS ===== */
.ev-card {
  padding: 9px 11px; border-radius: var(--radius-sm);
  background: var(--bg-surface2);
  border: 1px solid var(--border);
  border-right: 3px solid var(--ev-color, var(--accent));
  transition: all 0.2s var(--ease);
  cursor: pointer;
  font-size: 0.78rem;
}
.ev-card:hover { border-color: var(--border-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.ev-card.ev-now {
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--ev-color, var(--accent)) 12%, var(--bg-surface2)) 0%,
    var(--bg-surface2) 100%);
  animation: glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 8px color-mix(in srgb, var(--ev-color, var(--accent)) 30%, transparent); }
  50% { box-shadow: 0 0 20px color-mix(in srgb, var(--ev-color, var(--accent)) 50%, transparent); }
}
.ev-card.ev-allday {
  padding: 5px 10px; opacity: 0.55;
  background: transparent; border: 1px dashed var(--border);
  border-right: 2px solid var(--ev-color, var(--text-3));
  font-size: 0.72rem;
}
.ev-card.ev-allday:hover { opacity: 0.8; }
.ev-badges { display: flex; gap: 4px; margin-bottom: 5px; flex-wrap: wrap; }
.ev-badge {
  font-size: 0.62rem; padding: 1px 6px; border-radius: var(--radius-xl); font-weight: 600;
}
.ev-badge-lesson { background: rgba(124,111,247,0.2); color: var(--accent); }
.ev-badge-now { background: rgba(0,229,204,0.2); color: var(--teal); }
.ev-badge-today { background: rgba(255,209,102,0.2); color: var(--gold); }
.ev-badge-past { color: var(--text-3); background: var(--bg-surface); }
.ev-title { font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.ev-meta { display: flex; gap: 8px; font-size: 0.68rem; color: var(--text-3); }
.ev-progress {
  height: 3px; background: var(--bg-base); border-radius: 2px; overflow: hidden; margin-top: 6px;
}
.ev-progress-fill {
  height: 100%; background: var(--ev-color, var(--accent)); border-radius: 2px; transition: width 1s linear;
}
.ev-task-chips { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
.ev-task-chip {
  font-size: 0.65rem; padding: 2px 7px; border-radius: var(--radius-xl);
  background: rgba(255,255,255,0.05); color: var(--text-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  border: 1px solid var(--border);
}
.ev-add-task {
  font-size: 0.65rem; color: var(--text-3); margin-top: 6px;
  padding: 3px 8px; border-radius: var(--radius-xl);
  border: 1px dashed var(--border);
  transition: all 0.15s;
  display: inline-block;
}
.ev-add-task:hover { color: var(--accent); border-color: var(--accent); }
.day-empty { text-align: center; font-size: 0.75rem; color: var(--text-3); padding: 20px 10px; }

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 0.95rem;
}
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-surface2); font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(255,71,87,0.2); color: var(--urg-overdue); }
.modal-body { padding: 16px 20px 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.75rem; color: var(--text-2); margin-bottom: 5px; font-weight: 500; }
.form-label-em { color: var(--gold) !important; font-weight: 700 !important; }
.form-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-primary {
  flex: 1; padding: 9px 16px; border-radius: var(--radius-sm);
  background: var(--accent); color: #fff; font-weight: 600; font-size: 0.85rem;
  border: none; transition: all 0.2s var(--spring);
}
.btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 16px var(--accent-glow); }
.btn-secondary {
  padding: 9px 16px; border-radius: var(--radius-sm);
  background: var(--bg-surface2); border: 1px solid var(--border);
  font-size: 0.85rem; transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--border-hover); }

/* Status selector buttons */
.status-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.status-btn {
  flex: 1; min-width: 70px; padding: 7px 10px; border-radius: var(--radius-sm);
  font-size: 0.75rem; font-weight: 600; text-align: center;
  border: 2px solid var(--border); transition: all 0.2s var(--spring);
  cursor: pointer;
}
.status-btn[data-s="none"] { color: var(--s-none); }
.status-btn[data-s="none"].selected { border-color: var(--s-none); background: rgba(64,64,96,0.2); }
.status-btn[data-s="todo"] { color: var(--s-todo); }
.status-btn[data-s="todo"].selected { border-color: var(--s-todo); background: rgba(111,187,247,0.1); }
.status-btn[data-s="inprogress"] { color: var(--s-inprogress); }
.status-btn[data-s="inprogress"].selected { border-color: var(--s-inprogress); background: rgba(255,209,102,0.1); }
.status-btn[data-s="submitted"] { color: var(--s-submitted); }
.status-btn[data-s="submitted"].selected { border-color: var(--s-submitted); background: rgba(0,229,204,0.1); }

/* Course picker grid */
.course-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.course-pick {
  padding: 10px 8px; border-radius: var(--radius-sm);
  border: 2px solid var(--border); text-align: center;
  font-size: 0.75rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s var(--spring);
}
.course-pick:hover { transform: scale(1.03); }
.course-pick.selected { border-width: 2px; }

/* ICS modal */
.ics-url-box {
  padding: 10px 12px; border-radius: var(--radius-sm);
  background: var(--bg-base); border: 1px solid var(--border);
  font-size: 0.73rem; word-break: break-all; direction: ltr; text-align: left;
  color: var(--text-2); user-select: all;
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 20px; left: 50%; z-index: 9999;
  transform: translateX(-50%) translateY(10px);
  background: var(--bg-surface2); border: 1px solid var(--border-hover);
  border-radius: var(--radius-md); padding: 9px 18px;
  font-size: 0.83rem; opacity: 0;
  transition: all 0.25s var(--spring); pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== CONFETTI ===== */
.confetti-dot {
  position: fixed; top: -10px; width: 7px; height: 7px;
  border-radius: 50%; z-index: 9999; pointer-events: none;
  animation: fall 2s ease-in forwards;
}
@keyframes fall {
  to { transform: translateY(105vh) rotate(720deg); opacity: 0; }
}

/* ===== MOBILE ===== */
@media (max-width: 800px) {
  body { overflow: auto; }
  #app { grid-template-columns: 1fr; height: auto; overflow: visible; }
  #sidebar { border-left: none; border-bottom: 1px solid var(--border); max-height: none; overflow: visible; }
  #tasks-panel { max-height: 400px; }
  #cal-panel { min-height: 500px; }
  #cal-body { grid-template-columns: 1fr; }
  .cal-day:not(:first-child) { display: none; }
  .cal-day:first-child { border-left: none; }
}
</style>
</head>
<body>

<!-- ===== TOPBAR ===== -->
<header id="topbar">
  <div class="logo">🎬 <span>סם</span> שפיגל</div>
  <div class="search-wrap">
    <input type="search" id="global-search" placeholder="חיפוש שיעורים, משימות..." oninput="onGlobalSearch()">
  </div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="showICalModal()">📅 <span>יומן</span></button>
    <button class="topbar-btn" onclick="openModal('modal-settings')">⚙️</button>
    <button class="topbar-btn" id="btn-add-task" onclick="openTaskModal()">＋ משימה</button>
  </div>
</header>

<!-- ===== APP LAYOUT ===== -->
<div id="app">

  <!-- LEFT SIDEBAR -->
  <aside id="sidebar">

    <!-- KPI row -->
    <div id="kpi-row">
      <div class="kpi-card kpi-open">
        <div class="kpi-num" id="kpi-open">0</div>
        <div class="kpi-label">משימות פתוחות</div>
      </div>

<script>
// ============================================================
// STATE
// ============================================================
let events = [];
let courses = [];
let tasksData = [];
let linksData = [];
let personalStatus = {}; // taskId -> 'none'|'todo'|'inprogress'|'submitted'
let calStart = localDay(new Date()); // YYYY-MM-DD of window start
let searchQ = '';

// ============================================================
// FIREBASE
// ============================================================
firebase.initializeApp({
  apiKey: "AIzaSyBvlqtn-EkQPtJbgc_Qi_yIu9bjqfqdMyg",
  authDomain: "sam-spiegel.firebaseapp.com",
  projectId: "sam-spiegel",
  storageBucket: "sam-spiegel.firebasestorage.app",
  messagingSenderId: "816154980804",
  appId: "1:816154980804:web:34e15e12d4f2078d7cf491"
});
const db = firebase.firestore();

if (!localStorage.getItem('userId')) {
  localStorage.setItem('userId', crypto.randomUUID());
}
const userId = localStorage.getItem('userId');

// ============================================================
// DATE UTILITIES  (timezone-safe)
// ============================================================
function localDay(d) {
  // Returns "YYYY-MM-DD" in LOCAL timezone (not UTC)
  const dt = new Date(d);
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const day = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return localDay(d);
}

function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getDate()}/${dt.getMonth() + 1}`;
}

function fmtTime(d) {
  return new Date(d).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtFull(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
}

function dayName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][d.getDay()];
}

function isToday(dateStr) { return dateStr === localDay(new Date()); }

function isSameDay(dtStr, dateStr) {
  return localDay(new Date(dtStr)) === dateStr;
}

function weekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=sun
  d.setDate(d.getDate() - dow);
  return localDay(d);
}

function isAllDay(ev) {
  if (ev.is_allday) return true;
  const start = new Date(ev.start), end = new Date(ev.end);
  const durH = (end - start) / 3600000;
  return durH >= 8;
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

// ============================================================
// TOAST + CONFETTI
// ============================================================
function showToast(msg, dur = 2500) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, dur);
}

function confetti() {
  const cols = ['#7C6FF7','#00E5CC','#FFD166','#FF6B9D','#6FBBF7'];
  for (let i = 0; i < 28; i++) {
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.cssText = `left:${Math.random()*100}%;background:${cols[i % cols.length]};animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 2500);
  }
}

function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ============================================================
// SETTINGS
// ============================================================
function saveSetting(key, val) {
  localStorage.setItem(key, val);
}
function loadSettings() {
  const name = localStorage.getItem('userName') || '';
  document.getElementById('s-name').value = name;
  document.getElementById('s-userid').textContent = userId;
  document.getElementById('t-by').value = name;
  document.getElementById('link-by').value = name;
}

// ============================================================
// PERSONAL STATUS (localStorage + Firebase)
// ============================================================
function loadPersonalStatus() {
  personalStatus = JSON.parse(localStorage.getItem('pStatus') || '{}');
  db.collection('personal_status').doc(userId).collection('tasks').get().then(snap => {
    snap.docs.forEach(d => { personalStatus[d.id] = d.data().status || 'none'; });
    localStorage.setItem('pStatus', JSON.stringify(personalStatus));
    renderTaskList();
    renderKPIs();
  });
}

function getStatus(taskId) {
  return personalStatus[taskId] || 'none';
}

async function setStatus(taskId, status) {
  personalStatus[taskId] = status;
  localStorage.setItem('pStatus', JSON.stringify(personalStatus));
  renderTaskList();
  renderKPIs();
  renderCal(); // refresh chips on events
  await db.collection('personal_status').doc(userId).collection('tasks').doc(taskId).set({
    status, updated_at: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ============================================================
// COURSE HELPERS
// ============================================================
function getCourseColor(key) {
  return courses.find(c => c.key === key)?.color || '#7C6FF7';
}
function getCourseName(key) {
  return courses.find(c => c.key === key)?.short || key || '';
}

// ============================================================
// TASK URGENCY
// ============================================================
function urgency(t) {
  if (!t.due_date) return 'none';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(t.due_date + 'T00:00:00'); due.setHours(0,0,0,0);
  if (due < today) return 'overdue';
  const diff = (due - today) / 86400000;
  if (diff === 0) return 'today';
  if (diff <= 3) return 'soon';
  return 'none';
}

// ============================================================
// TASK LIST RENDER
// ============================================================
function renderTaskList() {
  const activeTasks = tasksData.filter(t => t.status === 'active');
  const uOrder = { overdue: 0, today: 1, soon: 2, none: 3 };
  activeTasks.sort((a, b) => uOrder[urgency(a)] - uOrder[urgency(b)] || (a.due_date || 'z').localeCompare(b.due_date || 'z'));

  document.getElementById('tasks-count').textContent = activeTasks.length;
  const list = document.getElementById('task-list');

  if (!activeTasks.length) {
    list.innerHTML = '<div class="task-empty">אין משימות 🎉<br><small>לחץ ＋ משימה להוספה</small></div>';
    return;
  }

  list.innerHTML = activeTasks.map(t => {
    const urg = urgency(t);
    const color = getCourseColor(t.course_key);
    const st = getStatus(t.id);
    const statusColors = { none: 'var(--s-none)', todo: 'var(--s-todo)', inprogress: 'var(--s-inprogress)', submitted: 'var(--s-submitted)' };
    const statusLabels = { none: 'אין סטטוס', todo: 'לא התחלתי', inprogress: 'בתהליך', submitted: '✓ הגשתי' };

    const dueClass = urg === 'overdue' ? 'due-overdue' : urg === 'soon' ? 'due-soon' : '';
    const dueLabel = t.due_date
      ? (urg === 'overdue' ? '⚠ פגה תאריך' : urg === 'today' ? '📅 היום' : `עד ${fmtDate(t.due_date + 'T00:00:00')}`)
      : '';

    return `
      <div class="task-item ${urg === 'overdue' ? 'is-overdue' : ''}"
           style="--task-color:${color}"
           onclick="openTaskModal('${t.id}')">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          ${t.course_key ? `<span class="task-course-tag">${esc(getCourseName(t.course_key))}</span>` : ''}
          ${dueLabel ? `<span class="task-due ${dueClass}">${dueLabel}</span>` : ''}
          <span class="task-status-pill" style="background:color-mix(in srgb,${statusColors[st]} 20%,transparent);color:${statusColors[st]}">${statusLabels[st]}</span>
        </div>
        <div class="task-actions-row" onclick="event.stopPropagation()">
          <button class="task-action-btn" onclick="cycleStatus('${t.id}')">↻ סטטוס</button>
          <button class="task-action-btn submit" onclick="markSubmitted('${t.id}')">✓ הגשתי</button>
          <button class="task-action-btn" onclick="openTaskModal('${t.id}')">✏ עריכה</button>
          <button class="task-action-btn danger" onclick="deleteTask('${t.id}')">🗑</button>
        </div>
      </div>`;
  }).join('');
}

function cycleStatus(id) {
  const order = ['none', 'todo', 'inprogress', 'submitted'];
  const cur = getStatus(id);
  const next = order[(order.indexOf(cur) + 1) % order.length];
  setStatus(id, next);
  if (next === 'submitted') confetti();
}

function markSubmitted(id) {
  setStatus(id, 'submitted');
  confetti();
  showToast('✅ הגשתי — כל הכבוד!');
}

async function deleteTask(id) {
  if (!confirm('למחוק משימה?')) return;
  await db.collection('tasks').doc(id).delete();
  delete personalStatus[id];
  localStorage.setItem('pStatus', JSON.stringify(personalStatus));
  showToast('🗑 נמחקה');
}

// ============================================================
// KPI RENDER
// ============================================================
function renderKPIs() {
  const active = tasksData.filter(t => t.status === 'active');
  const open = active.filter(t => getStatus(t.id) !== 'submitted');

  const now = new Date();
  const in72 = new Date(now.getTime() + 72*3600000);
  const soon72 = active.filter(t => {
    if (!t.due_date || getStatus(t.id) === 'submitted') return false;
    const due = new Date(t.due_date + 'T23:59:00');
    return due >= now && due <= in72;
  });

  // Lessons this week
  const ws = weekStart(localDay(now));
  const we = addDays(ws, 6);
  const lessonsThisWeek = events.filter(e =>
    e.type === 'lesson' &&
    localDay(new Date(e.start)) >= ws &&
    localDay(new Date(e.start)) <= we
  );

  // Submitted this week
  const submittedThisWeek = active.filter(t => {
    if (getStatus(t.id) !== 'submitted') return false;
    if (!t.due_date) return false;
    return t.due_date >= ws && t.due_date <= we;
  });

  document.getElementById('kpi-open').textContent = open.length;
  document.getElementById('kpi-72h').textContent = soon72.length;
  document.getElementById('kpi-lessons').textContent = lessonsThisWeek.length;
  document.getElementById('kpi-submitted').textContent = submittedThisWeek.length;
}

// ============================================================
// TASK MODAL (create + edit)
// ============================================================
let editingTaskId = null;

function openTaskModal(taskId, prefillEventUid) {
  editingTaskId = taskId || null;
  const task = taskId ? tasksData.find(t => t.id === taskId) : null;

  document.getElementById('task-modal-title').textContent = task ? '✏️ עריכת משימה' : '✏️ משימה חדשה';
  document.getElementById('t-title').value = task?.title || '';
  document.getElementById('t-desc').value = task?.description || '';
  document.getElementById('t-due').value = task?.due_date || '';
  document.getElementById('t-by').value = task?.created_by || localStorage.getItem('userName') || '';

  // Status
  const st = task ? getStatus(task.id) : 'none';
  document.querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.s === st);
  });
  document.getElementById('t-save-btn').textContent = task ? 'שמור שינויים' : 'הוסף משימה';

  // Build course grid
  buildCourseGrid(task?.course_key || null);

  // Prefill from event
  if (!task && prefillEventUid) {
    const ev = events.find(e => e.uid === prefillEventUid);
    if (ev) {
      document.getElementById('t-course').value = ev.course_key || '';
      document.getElementById('t-due').value = localDay(new Date(ev.start));
    }
  }

  openModal('modal-task');
  setTimeout(() => document.getElementById('t-title').focus(), 100);
}

function buildCourseGrid(selectedKey) {
  const grid = document.getElementById('t-course-grid');
  const noOpt = `<div class="course-pick ${!selectedKey ? 'selected' : ''}"
    style="border-color:${!selectedKey ? 'var(--text-3)' : 'var(--border)'}"
    onclick="selectCourse(null, this)">ללא קורס</div>`;
  grid.innerHTML = noOpt + courses.map(c => `
    <div class="course-pick ${c.key === selectedKey ? 'selected' : ''}"
         style="color:${c.color};border-color:${c.key === selectedKey ? c.color : 'var(--border)'};${c.key === selectedKey ? `background:color-mix(in srgb,${c.color} 15%,transparent)` : ''}"
         onclick="selectCourse('${c.key}', this, '${c.color}')">
      ${esc(c.short)}
    </div>`).join('');
  document.getElementById('t-course').value = selectedKey || '';
}

function selectCourse(key, el, color) {
  document.querySelectorAll('.course-pick').forEach(d => {
    d.classList.remove('selected');
    d.style.borderColor = 'var(--border)';
    d.style.background = '';
  });
  el.classList.add('selected');
  if (key && color) {
    el.style.borderColor = color;
    el.style.background = `color-mix(in srgb,${color} 15%,transparent)`;
  } else {
    el.style.borderColor = 'var(--text-3)';
  }
  document.getElementById('t-course').value = key || '';
}

function pickStatus(s) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('selected', b.dataset.s === s));
}

function getPickedStatus() {
  return document.querySelector('.status-btn.selected')?.dataset.s || 'none';
}

async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { showToast('נא למלא כותרת'); return; }

  const dueDate = document.getElementById('t-due').value || null;
  const desc = document.getElementById('t-desc').value.trim();
  const by = document.getElementById('t-by').value.trim() || 'אנונימי';
  const courseKey = document.getElementById('t-course').value || null;
  const st = getPickedStatus();

  if (by && by !== 'אנונימי') localStorage.setItem('userName', by);

  if (editingTaskId) {
    // Edit existing
    await db.collection('tasks').doc(editingTaskId).update({
      title, description: desc, due_date: dueDate, course_key: courseKey, created_by: by
    });
    personalStatus[editingTaskId] = st;
    localStorage.setItem('pStatus', JSON.stringify(personalStatus));
    await db.collection('personal_status').doc(userId).collection('tasks').doc(editingTaskId).set({
      status: st, updated_at: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('✏️ משימה עודכנה');
  } else {
    // New task
    const ref = await db.collection('tasks').add({
      title, description: desc, due_date: dueDate, course_key: courseKey,
      status: 'active', created_by: by,
      created_at: firebase.firestore.FieldValue.serverTimestamp()
    });
    personalStatus[ref.id] = st;
    localStorage.setItem('pStatus', JSON.stringify(personalStatus));
    await db.collection('personal_status').doc(userId).collection('tasks').doc(ref.id).set({
      status: st, updated_at: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('✅ משימה נוספה!');
  }

  closeModal('modal-task');
  renderTaskList();
  renderKPIs();
  renderCal();
}

// ============================================================
// PINBOARD
// ============================================================
function setupLinksListener() {
  db.collection('links').orderBy('order').onSnapshot(snap => {
    linksData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPinboard();
  });
}

function renderPinboard() {
  const strip = document.getElementById('pin-strip');
  const addBtn = strip.querySelector('.pin-add-btn');
  strip.innerHTML = '';

  document.getElementById('pin-count').textContent = linksData.length;

  linksData.forEach(link => {
    const card = document.createElement('div');
    const colorClass = link.type === 'announcement' ? `pin-${link.color || 'blue'}` : '';
    card.className = `pin-card ${colorClass}`;

    let inner = '';
    if (link.type === 'link') {
      inner = `<div class="pin-card-title">${esc(link.title)}</div>
               <div class="pin-card-sub">${link.url ? (() => { try { return new URL(link.url).hostname; } catch(e) { return link.url; } })() : ''}</div>`;
      card.onclick = () => { if (link.url) window.open(link.url, '_blank'); };
    } else if (link.type === 'announcement') {
      inner = `<div class="pin-card-title">${esc(link.title)}</div>
               <div class="pin-card-sub">${esc(link.text || '')}</div>`;
    } else if (link.type === 'countdown') {
      const daysLeft = Math.max(0, Math.ceil((new Date(link.due_date) - new Date()) / 86400000));
      const total = Math.max(1, Math.ceil((new Date(link.due_date) - (link.created_at?.toDate?.() || new Date())) / 86400000));
      const pct = Math.max(0, Math.min(100, ((total - daysLeft) / total) * 100));
      inner = `<div class="pin-card-title">${esc(link.title)}</div>
               <div class="pin-countdown-days">${daysLeft} ימים</div>
               <div class="pin-countdown-bar"><div class="pin-countdown-fill" style="width:${pct}%"></div></div>`;
    }

    card.innerHTML = inner + `<button class="pin-card-del" onclick="event.stopPropagation();deleteLink('${link.id}')">🗑</button>`;
    strip.appendChild(card);
  });

  if (addBtn) strip.appendChild(addBtn);
  else {
    const btn = document.createElement('button');
    btn.className = 'pin-add-btn';
    btn.textContent = '＋';
    btn.onclick = () => openModal('modal-link-add');
    strip.appendChild(btn);
  }
}

function toggleLinkFields() {
  const type = document.getElementById('link-type').value;
  document.getElementById('link-url-group').style.display = type === 'link' ? '' : 'none';
  document.getElementById('link-text-group').style.display = type === 'announcement' ? '' : 'none';
  document.getElementById('link-color-group').style.display = type === 'announcement' ? '' : 'none';
  document.getElementById('link-due-group').style.display = type === 'countdown' ? '' : 'none';
}

async function saveLink() {
  const type = document.getElementById('link-type').value;
  const data = {
    type, title: document.getElementById('link-title').value,
    order: linksData.length,
    created_by: document.getElementById('link-by').value || 'אנונימי',
    created_at: firebase.firestore.FieldValue.serverTimestamp()
  };
  if (type === 'link') data.url = document.getElementById('link-url').value;
  if (type === 'announcement') { data.text = document.getElementById('link-text').value; data.color = document.getElementById('link-color').value; }
  if (type === 'countdown') data.due_date = document.getElementById('link-due').value;

  await db.collection('links').add(data);
  closeModal('modal-link-add');
  showToast('📌 נוסף לפינבורד');
  document.getElementById('link-title').value = '';
  document.getElementById('link-url').value = '';
  document.getElementById('link-text').value = '';
}

async function deleteLink(id) {
  if (!confirm('למחוק?')) return;
  await db.collection('links').doc(id).delete();
  showToast('🗑 נמחק');
}

// ============================================================
// CALENDAR — 3-DAY VIEW
// ============================================================
function navCal(dir) {
  calStart = addDays(calStart, dir * 3);
  renderCal();
}

function goCalToday() {
  calStart = localDay(new Date());
  renderCal();
}

function renderCal() {
  const query = (document.getElementById('cal-search')?.value || searchQ).toLowerCase();
  const days = [calStart, addDays(calStart, 1), addDays(calStart, 2)];

  // Range label
  const d0 = new Date(days[0] + 'T00:00:00');
  const d2 = new Date(days[2] + 'T00:00:00');
  document.getElementById('cal-range').textContent =
    `${fmtDate(d0)} — ${fmtDate(d2)}`;

  const body = document.getElementById('cal-body');
  body.innerHTML = '';

  days.forEach(dayStr => {
    const col = document.createElement('div');
    col.className = 'cal-day';

    const hdr = document.createElement('div');
    hdr.className = 'cal-day-hdr' + (isToday(dayStr) ? ' is-today' : '');
    hdr.innerHTML = `<div class="day-name">יום ${dayName(dayStr)}</div><div class="day-date">${new Date(dayStr + 'T00:00:00').getDate()}<span style="font-size:0.65rem;font-weight:400;color:var(--text-3);margin-right:4px">/${new Date(dayStr + 'T00:00:00').getMonth() + 1}</span></div>`;
    col.appendChild(hdr);

    const evts = document.createElement('div');
    evts.className = 'cal-day-events';

    // Events for this day
    const dayEvents = events.filter(e => isSameDay(e.start, dayStr) && (!query || e.title.toLowerCase().includes(query)));
    dayEvents.sort((a, b) => a.start.localeCompare(b.start));

    // Tasks due this day
    const dayTasks = tasksData.filter(t =>
      t.status === 'active' && t.due_date === dayStr &&
      (!query || t.title.toLowerCase().includes(query))
    );

    dayEvents.forEach(ev => evts.appendChild(buildEventCard(ev)));
    dayTasks.forEach(t => evts.appendChild(buildTaskDueCard(t)));

    if (!dayEvents.length && !dayTasks.length) {
      const emp = document.createElement('div');
      emp.className = 'day-empty';
      emp.textContent = isToday(dayStr) ? 'אין שיעורים היום 🎉' : 'אין שיעורים';
      evts.appendChild(emp);
    }

    col.appendChild(evts);
    body.appendChild(col);
  });

  updateProgressBars();
}

function getEventStatus(ev) {
  const now = new Date();
  const start = new Date(ev.start), end = new Date(ev.end);
  if (now >= start && now <= end) return 'now';
  if (isSameDay(ev.start, localDay(now))) return 'today';
  if (start > now) return 'future';
  return 'past';
}

function buildEventCard(ev) {
  const color = getCourseColor(ev.course_key);
  const status = getEventStatus(ev);
  const allDay = isAllDay(ev);
  const relTasks = tasksData.filter(t => t.linked_event_uid === ev.uid && t.status === 'active');
  const statusLabels = { now: 'עכשיו', today: 'היום', future: '', past: 'עבר' };

  const card = document.createElement('div');
  const cls = ['ev-card'];
  if (allDay) cls.push('ev-allday');
  else if (status === 'now') cls.push('ev-now');
  card.className = cls.join(' ');
  card.dataset.uid = ev.uid;
  card.style.setProperty('--ev-color', color);

  if (allDay) {
    card.innerHTML = `<div class="ev-title" style="color:var(--text-2)">${esc(ev.title)}</div>`;
    return card;
  }

  const badgesHtml = [
    ev.lesson_number ? `<span class="ev-badge ev-badge-lesson">שיעור ${ev.lesson_number}</span>` : '',
    status !== 'future' && statusLabels[status] ? `<span class="ev-badge ev-badge-${status}">${statusLabels[status]}</span>` : ''
  ].filter(Boolean).join('');

  const progressHtml = status === 'now' ? (() => {
    const pct = Math.min(100, Math.max(0, (Date.now() - new Date(ev.start)) / (new Date(ev.end) - new Date(ev.start)) * 100));
    return `<div class="ev-progress"><div class="ev-progress-fill" style="width:${pct}%"></div></div>`;
  })() : '';

  const chipsHtml = relTasks.length
    ? `<div class="ev-task-chips">${relTasks.slice(0, 3).map(t => `<div class="ev-task-chip">📌 ${esc(t.title)}</div>`).join('')}</div>`
    : '';

  card.innerHTML = `
    ${badgesHtml ? `<div class="ev-badges">${badgesHtml}</div>` : ''}
    <div class="ev-title">${esc(ev.title)}</div>
    <div class="ev-meta">
      <span>🕙 ${fmtTime(ev.start)}–${fmtTime(ev.end)}</span>
      ${ev.location ? `<span>📍 ${esc(ev.location)}</span>` : ''}
    </div>
    ${chipsHtml}
    ${progressHtml}
    <button class="ev-add-task" onclick="event.stopPropagation();openTaskModal(null,'${ev.uid}')">＋ משימה</button>`;

  return card;
}

function buildTaskDueCard(t) {
  const color = getCourseColor(t.course_key);
  const st = getStatus(t.id);
  const statusColors = { none: 'var(--s-none)', todo: 'var(--s-todo)', inprogress: 'var(--s-inprogress)', submitted: 'var(--s-submitted)' };
  const statusLabels = { none: 'אין סטטוס', todo: 'לא התחלתי', inprogress: 'בתהליך', submitted: '✓ הגשתי' };

  const card = document.createElement('div');
  card.className = 'ev-card';
  card.style.setProperty('--ev-color', statusColors[st]);
  card.innerHTML = `
    <div class="ev-badges">
      <span class="ev-badge" style="background:color-mix(in srgb,${statusColors[st]} 20%,transparent);color:${statusColors[st]}">${statusLabels[st]}</span>
    </div>
    <div class="ev-title">📌 ${esc(t.title)}</div>
    <div class="ev-meta">
      ${t.course_key ? `<span style="color:${color}">${esc(getCourseName(t.course_key))}</span>` : ''}
      <span>יעד: ${fmtDate(new Date(t.due_date + 'T00:00:00'))}</span>
    </div>`;
  card.onclick = () => openTaskModal(t.id);
  return card;
}

function updateProgressBars() {
  document.querySelectorAll('.ev-card.ev-now').forEach(card => {
    const ev = events.find(e => e.uid === card.dataset.uid);
    if (!ev) return;
    const fill = card.querySelector('.ev-progress-fill');
    if (!fill) return;
    const pct = Math.min(100, Math.max(0, (Date.now() - new Date(ev.start)) / (new Date(ev.end) - new Date(ev.start)) * 100));
    fill.style.width = pct + '%';
  });
}

setInterval(() => { renderCal(); }, 60000); // refresh every minute

// ============================================================
// ICS GENERATION
// ============================================================
function generateICS() {
  function toICSDate(iso) {
    return iso.replace(/[-:]/g, '').replace(/\.\d{3}/, '').replace(/ /, 'T');
  }
  const lines = [
    'BEGIN:VCALENDAR', 'VERSION:2.0',
    'PRODID:-//Sam Spiegel//Dashboard//HE',
    'CALSCALE:GREGORIAN', 'METHOD:PUBLISH',
    'X-WR-CALNAME:סם שפיגל — לוח שנה כיתתי',
    'X-WR-TIMEZONE:Asia/Jerusalem'
  ];
  events.forEach(ev => {
    const teacher = courses.find(c => c.key === ev.course_key)?.teacher || '';
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${ev.uid}@samspiegel`);
    lines.push(`DTSTART:${toICSDate(ev.start)}`);
    lines.push(`DTEND:${toICSDate(ev.end)}`);
    lines.push(`SUMMARY:${ev.title}${ev.lesson_number ? ` — שיעור ${ev.lesson_number}` : ''}`);
    lines.push(`DESCRIPTION:${getCourseName(ev.course_key)}${teacher ? ' | ' + teacher : ''}`);
    if (ev.location) lines.push(`LOCATION:${ev.location}`);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS() {
  const blob = new Blob([generateICS()], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'sam-spiegel.ics'; a.click();
  URL.revokeObjectURL(url);
  showToast('📅 ICS הורד!');
}

function showICalModal() {
  const workerUrl = `https://samspigel.workers.dev/ics/${userId}`;
  document.getElementById('ical-url').textContent = workerUrl;
  document.getElementById('btn-copy-ical').onclick = () => {
    navigator.clipboard.writeText(workerUrl).then(() => showToast('📋 הועתק!'));
  };
  openModal('modal-ical');
}

// ============================================================
// INIT
// ============================================================
async function init() {
  loadSettings();
  loadPersonalStatus();

  try {
    const [evRes, cRes] = await Promise.all([
      fetch('data/events.json').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('data/courses.json').then(r => r.ok ? r.json() : null).catch(() => null)
    ]);
    if (evRes?.events) events = evRes.events;
    if (cRes) courses = cRes;
  } catch(e) { console.warn('static data load failed:', e); }

  // Build course grid in task modal
  buildCourseGrid(null);

  renderCal();
  renderKPIs();

  setupLinksListener();
  setupTasksListener();

  // Auto-refresh events every 30 min
  setInterval(async () => {
    try {
      const r = await fetch('data/events.json');
      if (r.ok) { const d = await r.json(); if (d.events) { events = d.events; renderCal(); renderKPIs(); } }
    } catch(e) {}
  }, 30 * 60000);
}

init();
