<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סם שפיגל — דשבורד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg:#0a0a12; --bg2:#11111c; --bg3:#1a1a28;
  --glass:rgba(255,255,255,0.04); --glass2:rgba(255,255,255,0.07);
  --accent:#5a4fcf; --accent2:#7c6ff7; --accent-glow:rgba(90,79,207,0.35);
  --text1:#f0f0fa; --text2:#8080a0; --text3:#404060;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --red:#ff4757; --amber:#ffd166; --green:#00e5cc; --blue:#6fbbf7;
  --radius:12px; --spring:cubic-bezier(0.34,1.56,0.64,1); --ease:cubic-bezier(0.4,0,0.2,1);
}
.light {
  --bg:#f4f4fd; --bg2:#eaeaf5; --bg3:#ffffff;
  --glass:rgba(0,0,0,0.04); --glass2:rgba(0,0,0,0.07);
  --text1:#1a1a2e; --text2:#505070; --text3:#a0a0c0;
  --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;direction:rtl;background:var(--bg);color:var(--text1);font-size:14px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;background:var(--bg3);color:var(--text1);border:1px solid var(--border);border-radius:8px;padding:7px 11px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* BLOBS */
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.2;animation:blobMove 12s ease-in-out infinite alternate;}
.blob1{width:400px;height:400px;background:#5a4fcf;top:-100px;right:-80px;}
.blob2{width:350px;height:350px;background:#7c6ff7;bottom:-80px;left:-80px;animation-delay:-6s;}
@keyframes blobMove{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,30px) scale(1.1);}}
@media(prefers-reduced-motion:reduce){.blob{animation:none;}}

/* TOPBAR */
#topbar{position:relative;z-index:100;display:flex;align-items:center;gap:8px;padding:0 16px;height:52px;background:rgba(10,10,18,0.88);backdrop-filter:blur(20px) saturate(150%);border-bottom:1px solid var(--border);flex-shrink:0;}
.light #topbar{background:rgba(244,244,253,0.88);}
.logo{font-size:1rem;font-weight:800;white-space:nowrap;}
.logo span{color:var(--accent2);}
#search-input{max-width:210px;padding:6px 10px;border-radius:20px;font-size:0.8rem;}
.spacer{flex:1;}
.tbtn{padding:5px 11px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);font-size:0.78rem;color:var(--text2);transition:all 0.15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--border2);color:var(--text1);}
.tbtn.accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.tbtn.accent:hover{background:var(--accent2);}

/* LAYOUT */
#app{display:flex;height:calc(100vh - 52px);position:relative;z-index:1;overflow:hidden;}
#right-col{width:360px;min-width:220px;max-width:600px;display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden;}
#col-resizer{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;transition:background 0.15s;}
#col-resizer:hover{background:var(--accent);opacity:0.5;}
#left-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.h-resizer{height:5px;cursor:row-resize;background:transparent;flex-shrink:0;transition:background 0.15s;}
.h-resizer:hover{background:var(--accent);opacity:0.4;}

/* PANEL */
.panel{display:flex;flex-direction:column;overflow:hidden;}
.panel-head{display:flex;align-items:center;gap:8px;padding:8px 14px 6px;flex-shrink:0;border-bottom:1px solid var(--border);}
.panel-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);}
.panel-head .ml{margin-right:auto;}
.panel-body{flex:1;overflow-y:auto;}

/* KPI */
#kpi-panel{flex-shrink:0;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.kpi-card{padding:12px 14px;background:var(--bg2);}
.kpi-val{font-size:1.6rem;font-weight:800;line-height:1;letter-spacing:-1px;}
.kpi-lbl{font-size:0.68rem;color:var(--text3);margin-top:2px;}
.kpi-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width 0.5s var(--ease);}

/* KANBAN */
#kanban-panel{flex:1;overflow:hidden;}
#kanban-body{display:flex;gap:0;overflow-x:auto;overflow-y:hidden;height:100%;padding:8px;}
.k-col{flex:1;min-width:130px;display:flex;flex-direction:column;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);margin:0 3px;overflow:hidden;}
.k-col.drag-over{border-color:var(--accent);background:rgba(90,79,207,0.06);}
.k-col-head{padding:7px 10px;font-size:0.7rem;font-weight:700;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.k-col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px;}
.k-card{padding:8px 10px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--task-color,var(--text3));cursor:grab;transition:all 0.15s;font-size:0.75rem;}
.k-card:hover{border-color:var(--border2);background:var(--bg3);}
.k-card.dragging{opacity:0.4;}
.k-card-title{font-weight:600;line-height:1.3;margin-bottom:5px;}
.k-card-meta{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.k-tag{font-size:0.6rem;padding:1px 6px;border-radius:10px;font-weight:600;background:rgba(255,255,255,0.08);color:var(--text2);}
.k-urg{font-size:0.62rem;font-weight:700;}

/* MOVIES */
#movies-panel{flex-shrink:0;}
#movies-list{padding:6px 10px;display:flex;flex-wrap:wrap;gap:5px;min-height:40px;}
.movie-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:0.72rem;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;max-width:160px;}
.movie-pill.watched{background:rgba(0,229,204,0.1);border-color:rgba(0,229,204,0.3);color:var(--green);text-decoration:line-through;}
.movie-pill-del{opacity:0;font-size:0.6rem;color:var(--red);flex-shrink:0;}
.movie-pill:hover .movie-pill-del{opacity:1;}

/* FEED */
#feed-panel{flex-shrink:0;height:105px;}
#feed-strip{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:6px 10px;height:100%;align-items:center;}
.feed-card{flex-shrink:0;width:160px;height:78px;padding:8px 10px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;justify-content:space-between;}
.feed-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.feed-card.type-announcement{border-top:3px solid #ff6b35;}
.feed-card.type-countdown{border-top:3px solid var(--accent2);}
.feed-card-title{font-size:0.72rem;font-weight:600;line-height:1.2;}
.feed-card-sub{font-size:0.62rem;color:var(--text2);}
.feed-cbar{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.feed-cbar-fill{height:100%;border-radius:2px;background:var(--accent2);}
.feed-add{width:50px;flex-shrink:0;height:78px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg2);border:1px dashed var(--border);cursor:pointer;color:var(--text3);font-size:1.2rem;transition:all 0.15s;}
.feed-add:hover{border-color:var(--accent);color:var(--accent);}

/* CALENDAR */
#calendar-panel{flex:1;overflow:hidden;}
#cal-grid{overflow:auto;display:grid;gap:1px;background:var(--border);}
.cal-day{background:var(--bg);min-height:80px;padding:4px;font-size:0.7rem;display:flex;flex-direction:column;gap:2px;position:relative;}
.cal-day.today{background:rgba(90,79,207,0.08);}
.cal-day-num{font-size:0.72rem;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.cal-day.today .cal-day-num{color:var(--accent2);}
.cal-add-btn{opacity:0;font-size:0.6rem;color:var(--accent2);cursor:pointer;padding:1px 4px;background:rgba(90,79,207,0.15);border-radius:4px;border:none;}
.cal-day:hover .cal-add-btn{opacity:1;}
.cal-chip{font-size:0.62rem;padding:1px 5px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;line-height:1.4;}
.cal-chip:hover{filter:brightness(1.2);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:24px;width:min(520px,95vw);max-height:90vh;overflow-y:auto;animation:modalIn 0.2s var(--spring);}
@keyframes modalIn{from{transform:scale(0.95) translateY(10px);opacity:0;}to{transform:none;opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:1.05rem;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);font-size:0.9rem;color:var(--text2);}
.modal-close:hover{color:var(--text1);}
.form-group{margin-bottom:14px;}
.form-label{font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.course-pills{display:flex;flex-wrap:wrap;gap:6px;}
.cpill{padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;border:2px solid transparent;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.06);color:var(--text2);}
.cpill.sel{color:#fff;}
.status-btns{display:flex;gap:6px;flex-wrap:wrap;}
.status-btn{flex:1;padding:7px 6px;border-radius:8px;font-size:0.73rem;font-weight:600;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;transition:all 0.15s;text-align:center;white-space:nowrap;}
.status-btn.active{border-color:var(--accent2);background:rgba(90,79,207,0.12);color:var(--accent2);}
.date-wrap{position:relative;}
.date-wrap input{cursor:pointer;}
.date-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.8rem;pointer-events:none;}
.lesson-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;padding:3px 8px;border-radius:8px;background:rgba(90,79,207,0.12);color:var(--accent2);margin-top:5px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-primary{flex:1;padding:10px;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:0.85rem;border:none;cursor:pointer;transition:all 0.15s;}
.btn-primary:hover{background:var(--accent2);}
.btn-secondary{padding:10px 16px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:0.85rem;cursor:pointer;transition:all 0.15s;}
.btn-secondary:hover{border-color:var(--border2);color:var(--text1);}
.btn-danger{padding:10px 14px;border-radius:10px;background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:var(--red);font-size:0.85rem;cursor:pointer;transition:all 0.15s;}
.btn-danger:hover{background:rgba(255,71,87,0.2);}

/* DATE PICKER */
#dp-overlay{display:none;position:fixed;z-index:800;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);width:280px;animation:modalIn 0.15s var(--spring);}
#dp-overlay.open{display:block;}
.dp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dp-navbtn{padding:4px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:0.8rem;cursor:pointer;}
.dp-title{font-weight:700;font-size:0.85rem;}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dp-dh{text-align:center;font-size:0.6rem;color:var(--text3);font-weight:700;padding:4px 0;}
.dp-day{text-align:center;padding:5px 2px;border-radius:6px;font-size:0.72rem;cursor:pointer;transition:all 0.1s;}
.dp-day:hover{background:var(--bg3);}
.dp-day.dp-today{font-weight:800;color:var(--accent2);}
.dp-day.dp-sel{background:var(--accent);color:#fff;}
.dp-day.dp-l1{background:rgba(111,187,247,0.18);}
.dp-day.dp-l2{background:rgba(255,209,102,0.22);}
.dp-day.dp-l3{background:rgba(255,71,87,0.22);}
.dp-day.dp-other{opacity:0.3;}
.dp-preview{margin-top:10px;font-size:0.7rem;color:var(--text2);min-height:36px;line-height:1.5;}
.dp-actions{display:flex;gap:6px;margin-top:10px;justify-content:space-between;}
.dp-btn{padding:5px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);font-size:0.72rem;cursor:pointer;color:var(--text2);}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:0.82rem;z-index:1000;opacity:0;transition:all 0.3s var(--spring);pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.s-label{font-size:0.8rem;font-weight:500;}
.s-sub{font-size:0.67rem;color:var(--text3);margin-top:2px;}

/* TOGGLE */
.tgl{position:relative;width:38px;height:21px;display:inline-block;}
.tgl input{opacity:0;width:0;height:0;}
.tgl-track{position:absolute;inset:0;background:var(--border2);border-radius:20px;cursor:pointer;transition:0.2s;}
.tgl-track::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:white;top:3px;right:3px;transition:0.2s;}
input:checked + .tgl-track{background:var(--accent);}
input:checked + .tgl-track::after{right:calc(100% - 18px);}

/* MISC */
.empty{text-align:center;color:var(--text3);font-size:0.78rem;padding:20px;}
.no-sb{scrollbar-width:none;}
.no-sb::-webkit-scrollbar{display:none;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

@media(max-width:768px){
  #app{flex-direction:column;}
  #right-col{width:100%;border-left:none;max-width:none;flex-shrink:0;}
  #col-resizer{display:none;}
  .blob{display:none;}
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<header id="topbar">
  <div class="logo">סם <span>שפיגל</span></div>
  <input id="search-input" type="text" placeholder="🔍 חיפוש...">
  <div class="spacer"></div>
  <button class="tbtn" id="btn-cal-range" onclick="cycleCalRange()">14 ימים</button>
  <button class="tbtn" id="btn-dark" onclick="toggleDark()" title="מצב תצוגה">☀️</button>
  <button class="tbtn" onclick="openSettings()">⚙️</button>
  <button class="tbtn accent" onclick="openTaskModal(null)">+ משימה</button>
</header>

<div id="app">
  <div id="right-col">
    <div id="kpi-panel" class="panel">
      <div id="kpi-grid" class="kpi-grid"></div>
    </div>
    <div class="h-resizer" id="r1"></div>
    <div id="kanban-panel" class="panel" style="flex:1;min-height:0;">
      <div class="panel-head">
        <span class="panel-title">📋 משימות</span>
        <button class="tbtn ml" id="btn-kview" onclick="toggleKView()" style="font-size:0.68rem;padding:3px 8px;">קנבן</button>
      </div>
      <div id="kanban-body" class="no-sb" style="flex:1;overflow:hidden;"></div>
    </div>
    <div class="h-resizer" id="r2"></div>
    <div id="movies-panel" class="panel" style="flex-shrink:0;height:130px;">
      <div class="panel-head">
        <span class="panel-title">🎬 צפיות</span>
        <button class="tbtn ml" onclick="addMoviePrompt()" style="font-size:0.68rem;padding:3px 8px;">+ הוסף</button>
      </div>
      <div id="movies-list" class="panel-body no-sb"></div>
    </div>
  </div>

  <div id="col-resizer"></div>

  <div id="left-col">
    <div id="feed-panel" class="panel" style="flex-shrink:0;height:105px;">
      <div id="feed-strip" class="no-sb"></div>
    </div>
    <div class="h-resizer" id="r3"></div>
    <div id="calendar-panel" class="panel" style="flex:1;min-height:0;">
      <div class="panel-head">
        <span class="panel-title">📅 יומן</span>
        <div class="ml" style="display:flex;gap:5px;align-items:center;">
          <button class="tbtn" onclick="shiftCal(-1)" style="font-size:0.75rem;padding:3px 8px;">‹</button>
          <span id="cal-label" style="font-size:0.72rem;color:var(--text2);white-space:nowrap;"></span>
          <button class="tbtn" onclick="shiftCal(1)" style="font-size:0.75rem;padding:3px 8px;">›</button>
          <button class="tbtn" onclick="openEventModal(null)" style="font-size:0.68rem;padding:3px 8px;">+ אירוע</button>
        </div>
      </div>
      <div id="cal-grid" class="panel-body"></div>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-ol">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="task-modal-title">משימה חדשה</span>
      <button class="modal-close" onclick="closeModal('task-ol')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">שם המשימה *</label>
      <input type="text" id="t-name" placeholder="כותרת...">
    </div>
    <div class="form-group">
      <label class="form-label">קורס</label>
      <div id="t-courses" class="course-pills"></div>
    </div>
    <div class="two-col">
      <div class="form-group">
        <label class="form-label">📂 תאריך פתיחה</label>
        <div class="date-wrap">
          <input type="text" id="t-opening" placeholder="DD/MM/YYYY" readonly onclick="openDP('t-opening',this)">
          <span class="date-icon">📂</span>
        </div>
        <div id="t-opening-badge" class="lesson-badge" style="display:none;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">📅 תאריך יעד</label>
        <div class="date-wrap">
          <input type="text" id="t-due" placeholder="DD/MM/YYYY" readonly onclick="openDP('t-due',this)">
          <span class="date-icon">📅</span>
        </div>
        <div id="t-due-badge" class="lesson-badge" style="display:none;"></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">תיאור</label>
      <textarea id="t-desc" rows="2" placeholder="הערות..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">הסטטוס שלי</label>
      <div class="status-btns" id="t-status-btns">
        <button class="status-btn" data-v="none" onclick="selStatus('none')">📋 פתוח</button>
        <button class="status-btn" data-v="todo" onclick="selStatus('todo')">🔴 לא התחלתי</button>
        <button class="status-btn" data-v="inprogress" onclick="selStatus('inprogress')">🟡 בתהליך</button>
        <button class="status-btn" data-v="submitted" onclick="selStatus('submitted')">✅ הוגש</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">נוסף ע"י</label>
      <input type="text" id="t-by">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveTask()">שמור</button>
      <button class="btn-danger" id="t-del" onclick="deleteTask()" style="display:none;">מחק</button>
      <button class="btn-secondary" onclick="closeModal('task-ol')">ביטול</button>
    </div>
  </div>

const FB_CFG = {

// ── COURSE ALIASES ───────────────────────────────────────────
const ALIASES = {
  'תחקיר':'tachkir','סדנת תחקיר':'tachkir',
  'לוקיישן':'location','תסריט לוקיישן':'location','סדנת תסריט לוקיישן':'location',

};

// ── UTILS ────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toYMD = d => { const dt=typeof d==='string'?new Date(d):d; return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };
const fmtD = d => { if(!d)return''; const dt=new Date(typeof d==='string'&&!d.includes('T')?d+'T00:00:00':d); return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`; };
const fmtDS = d => { if(!d)return''; const dt=new Date(typeof d==='string'&&!d.includes('T')?d+'T00:00:00':d); return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`; };
const parseDD = str => { if(!str)return null; const p=str.split('/'); if(p.length!==3)return null; return new Date(+p[2],+p[1]-1,+p[0]); };
const isSame = (a,b) => toYMD(new Date(typeof a==='string'&&!a.includes('T')?a+'T00:00:00':a))===toYMD(new Date(typeof b==='string'&&!b.includes('T')?b+'T00:00:00':b));
const isToday = d => isSame(d, new Date());
const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);
const getCourse = k => courses.find(c=>c.key===k)||null;
const getCColor = k => { const c=getCourse(k); return c?c.color:'#8080a0'; };

function showToast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── LESSON MATCH ─────────────────────────────────────────────
function lessonsOnDay(ymd, courseKey){
  if(!ymd||!courseKey)return[];
  return icsEvs.filter(ev=>{
    const matched=ev.course_key===courseKey||
      Object.entries(ALIASES).some(([a,k])=>k===courseKey&&(ev.title||'').includes(a));
    return matched && isSame(ev.start, ymd+'T00:00:00');
  });
}
function findDueMatch(dueYMD, courseKey){
  if(!dueYMD||!courseKey)return null;
  for(let i=0;i<=6;i++){
    const d=new Date(dueYMD); d.setDate(d.getDate()-i);
    const ls=lessonsOnDay(toYMD(d),courseKey);
    if(ls.length>0)return ls[0];
  }
  return null;
}
function findOpenMatch(openYMD, courseKey){
  return lessonsOnDay(openYMD,courseKey)[0]||null;
}
function lessonLbl(l){
  if(!l)return'';
  const n=l.lesson_number?`שיעור ${l.lesson_number}`:'';
  return `${n} (${fmtDS(l.start)})`.trim();
}

// ── DATA LOADING ─────────────────────────────────────────────
async function loadData(){
  try{
    const [er,cr]=await Promise.all([fetch('data/events.json'),fetch('data/courses.json')]);
    icsEvs=await er.json();
    courses=await cr.json();
    movies=JSON.parse(localStorage.getItem('moviesData')||'[]');
    populateEvCourse();
  }catch(e){console.error('Load error:',e);}

  db.collection('tasks').where('status','==','active').onSnapshot(snap=>{
    tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderKanban(); renderCalendar(); renderKPIs();
  });
  db.collection('personal_status').doc(USER_ID).collection('tasks').onSnapshot(snap=>{
    personalSt={};
    snap.docs.forEach(d=>{personalSt[d.id]=d.data().status||'none';});
    renderKanban(); renderKPIs();
  });
  db.collection('links').orderBy('created_at','desc').onSnapshot(snap=>{
    links=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderFeed();
  });
  db.collection('custom_events').onSnapshot(snap=>{
    customEvs=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCalendar();
  });
}

function populateEvCourse(){
  const sel=document.getElementById('ev-course');
  if(!sel)return;
  courses.forEach(c=>{
    const o=document.createElement('option');
    o.value=c.key; o.textContent=c.short||c.name||c.key;
    sel.appendChild(o);
  });
}

// ── KPIs ─────────────────────────────────────────────────────
function renderKPIs(){
  const g=document.getElementById('kpi-grid');
  if(!g)return;
  const total=tasks.length;
  const submitted=tasks.filter(t=>(personalSt[t.id]||'none')==='submitted').length;
  const pct=total?Math.round(submitted/total*100):0;
  const now=new Date();
  const start=new Date(SEM_B_START), end=new Date(SEM_B_END);
  const semPct=Math.max(0,Math.min(100,Math.round((now-start)/(end-start)*100)));
  const ldone=icsEvs.filter(ev=>ev.type!=='special'&&new Date(ev.end)<now).length;
  const ltotal=icsEvs.filter(ev=>ev.type!=='special').length;
  g.innerHTML=`
    <div class="kpi-card">
      <div class="kpi-val" style="color:var(--accent2)">${pct}%</div>
      <div class="kpi-lbl">הושלמו (${submitted}/${total})</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${pct}%;background:var(--accent2)"></div></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val" style="color:var(--amber)">${semPct}%</div>
      <div class="kpi-lbl">סמסטר ב׳ · ${ldone}/${ltotal} שיעורים</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${semPct}%;background:var(--amber)"></div></div>
    </div>`;
}

// ── KANBAN ───────────────────────────────────────────────────
const KCOLS=[
  {key:'none',  lbl:'📋 פתוח',      col:'var(--text3)'},
  {key:'todo',  lbl:'🔴 לא התחלתי', col:'var(--red)'},
  {key:'inprogress',lbl:'🟡 בתהליך', col:'var(--amber)'},
  {key:'submitted',lbl:'✅ הוגש',    col:'var(--green)'},
];

function renderKanban(){
  const body=document.getElementById('kanban-body');
  if(!body)return;
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  if(kView==='list'){renderKList(body,q);return;}

  body.style.cssText='display:flex;gap:0;overflow-x:auto;overflow-y:hidden;height:100%;padding:8px;';
  body.innerHTML='';
  KCOLS.forEach(col=>{
    const colTasks=tasks.filter(t=>{
      if((personalSt[t.id]||'none')!==col.key)return false;
      if(q&&!(t.name||'').toLowerCase().includes(q))return false;
      return true;
    });
    const el=document.createElement('div');
    el.className='k-col'; el.dataset.status=col.key;
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(dragId)setPS(dragId,col.key);dragId=null;});
    el.innerHTML=`<div class="k-col-head"><span>${col.lbl}</span><span style="background:var(--bg);padding:1px 6px;border-radius:8px;font-size:0.62rem;">${colTasks.length}</span></div><div class="k-col-body" id="kcb-${col.key}"></div>`;
    body.appendChild(el);
    const cb=el.querySelector('.k-col-body');
    if(!colTasks.length){cb.innerHTML=`<div class="empty" style="padding:8px;font-size:0.7rem;">ריק</div>`;}
    else colTasks.forEach(t=>cb.appendChild(mkCard(t)));
  });
}

function renderKList(body,q){
  body.style.cssText='flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;';
  const sorted=[...tasks].filter(t=>!q||(t.name||'').toLowerCase().includes(q))
    .sort((a,b)=>{if(!a.due_date&&!b.due_date)return 0;if(!a.due_date)return 1;if(!b.due_date)return-1;return new Date(a.due_date)-new Date(b.due_date);});
  if(!sorted.length){body.innerHTML=`<div class="empty">אין משימות</div>`;return;}
  body.innerHTML=sorted.map(t=>{
    const color=getCColor(t.course_key);
    const c=getCourse(t.course_key);
    const stLbl=KCOLS.find(k=>k.key===(personalSt[t.id]||'none'))?.lbl||'';
    return `<div class="k-card" style="--task-color:${color};cursor:pointer;" onclick='openTaskModal(${JSON.stringify({id:t.id,...t})})'>
      <div class="k-card-title">${esc(t.name)}</div>
      <div class="k-card-meta">
        ${c?`<span class="k-tag" style="background:color-mix(in srgb,${color} 15%,transparent);color:${color}">${esc(c.short||c.name)}</span>`:''}
        ${t.due_date?`<span class="k-tag">📅 ${fmtDS(t.due_date)}</span>`:''}
        <span class="k-tag">${stLbl}</span>
      </div>
    </div>`;
  }).join('');
}

function mkCard(t){
  const color=getCColor(t.course_key);
  const c=getCourse(t.course_key);
  const due=t.due_date?new Date(t.due_date+'T00:00:00'):null;
  const now=new Date();
  const over=due&&due<now;
  const soon=due&&!over&&daysBetween(now,due)<=7;
  const el=document.createElement('div');
  el.className='k-card';
  el.style.setProperty('--task-color',color);
  el.draggable=true;
  el.dataset.tid=t.id;
  el.addEventListener('dragstart',()=>{dragId=t.id;el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('click',()=>openTaskModal(t));
  el.innerHTML=`
    <div class="k-card-title">${esc(t.name)}</div>
    <div class="k-card-meta">
      ${c?`<span class="k-tag" style="background:color-mix(in srgb,${color} 15%,transparent);color:${color}">${esc(c.short||c.name)}</span>`:''}
      ${t.opening_date?`<span class="k-tag">📂 ${fmtDS(t.opening_date)}</span>`:''}
      ${due?`<span class="k-tag" style="${over?'color:var(--red)':soon?'color:var(--blue)':''}">${over?'⚠':'📅'} ${fmtDS(due)}</span>`:''}
    </div>
    ${t.due_lesson_match?`<div style="font-size:0.6rem;color:var(--accent2);margin-top:4px;">🎓 ${esc(t.due_lesson_match)}</div>`:''}`;
  return el;
}

// ── CALENDAR ─────────────────────────────────────────────────
const HEB_DAYS=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const HEB_MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function renderCalendar(){
  const grid=document.getElementById('cal-grid');
  if(!grid)return;
  const today=new Date();
  const start=new Date(today);
  start.setDate(start.getDate()+calOffset);
  const days=[];
  for(let i=0;i<calDays;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d);}
  const lbl=document.getElementById('cal-label');
  if(lbl)lbl.textContent=`${fmtDS(days[0])} – ${fmtDS(days[days.length-1])}`;
  const cols=Math.min(calDays,7);
  grid.style.gridTemplateColumns=`repeat(${cols},minmax(0,1fr))`;
  grid.innerHTML='';
  days.forEach(day=>{
    const ymd=toYMD(day);
    const dayICS=icsEvs.filter(ev=>isSame(ev.start,day));
    const dayCustom=customEvs.filter(ev=>ev.start_date===ymd||isSame(ev.start_date+'T00:00:00',day));
    const dayTasks=tasks.filter(t=>t.due_date&&isSame(t.due_date+'T00:00:00',day));
    const cell=document.createElement('div');
    cell.className='cal-day'+(isToday(day)?' today':'');
    cell.dataset.date=ymd;
    const dayLabel=`${HEB_DAYS[day.getDay()]} ${day.getDate()}`;
    let html=`<div class="cal-day-num"><span>${dayLabel}</span><button class="cal-add-btn" onclick="openEventModal(null,'${ymd}')">+</button></div>`;
    dayICS.forEach(ev=>{
      const color=getCColor(ev.course_key)||'#8080a0';
      const title=ev.short||ev.title||'';
      html+=`<div class="cal-chip" style="background:${color}22;color:${color};" title="${esc(ev.title)}">${esc(title)}</div>`;
    });
    dayCustom.forEach(ev=>{
      const color=ev.color||'#7c6ff7';
      const evJ=JSON.stringify({id:ev.id,title:ev.title,start_date:ev.start_date,end_date:ev.end_date,start_time:ev.start_time,end_time:ev.end_time,color:ev.color,linked_course_key:ev.linked_course_key}).replace(/"/g,'&quot;');
      html+=`<div class="cal-chip" style="background:${color}22;color:${color};border:1px solid ${color}44;" onclick='openEventModal(JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify({id:ev.id,title:ev.title,start_date:ev.start_date,end_date:ev.end_date,start_time:ev.start_time,end_time:ev.end_time,color:ev.color,linked_course_key:ev.linked_course_key}))}"))' title="${esc(ev.title)}">✏ ${esc(ev.title)}</div>`;
    });
    dayTasks.forEach(t=>{
      const color=getCColor(t.course_key);
      const tJ=encodeURIComponent(JSON.stringify({id:t.id,name:t.name,course_key:t.course_key,opening_date:t.opening_date,due_date:t.due_date,description:t.description,added_by:t.added_by}));
      html+=`<div class="cal-chip" style="background:${color}18;color:${color};" onclick='openTaskModal(JSON.parse(decodeURIComponent("${tJ}")))'>📋 ${esc(t.name)}</div>`;
    });
    cell.innerHTML=html;
    grid.appendChild(cell);
  });
}

function cycleCalRange(){
  const r=[7,14,30];
  calDays=r[(r.indexOf(calDays)+1)%r.length];
  document.getElementById('btn-cal-range').textContent=`${calDays} ימים`;
  renderCalendar();
}
function shiftCal(dir){calOffset+=calDays*dir;renderCalendar();}

// ── FEED ──────────────────────────────────────────────────────
function renderFeed(){
  const strip=document.getElementById('feed-strip');
  if(!strip)return;
  strip.innerHTML='';
  // Semester countdown
  const now=new Date();
  const semEnd=new Date(SEM_B_END+'T00:00:00');
  const semStart=new Date(SEM_B_START+'T00:00:00');
  const dLeft=Math.max(0,Math.ceil((semEnd-now)/86400000));
  const pct=Math.max(0,Math.min(100,Math.round((now-semStart)/(semEnd-semStart)*100)));
  strip.insertAdjacentHTML('beforeend',`
    <div class="feed-card type-countdown">
      <div class="feed-card-title">סוף סמסטר ב׳</div>
      <div class="feed-card-sub">${dLeft} ימים נותרו</div>
      <div class="feed-cbar"><div class="feed-cbar-fill" style="width:${pct}%"></div></div>
    </div>`);
  // Add button
  strip.insertAdjacentHTML('beforeend',`<div class="feed-add" onclick="openFeedModal(null)">+</div>`);
  // Firebase items
  links.forEach(item=>{
    const tc=item.type==='announcement'?'type-announcement':item.type==='countdown'?'type-countdown':'';
    let extra='';
    if(item.type==='countdown'&&item.target_date){
      const d=new Date(item.target_date+'T00:00:00');
      const dl=Math.max(0,Math.ceil((d-now)/86400000));
      const p=Math.max(0,Math.min(100,Math.round((now-semStart)/(d-semStart)*100)));
      extra=`<div class="feed-card-sub">${dl} ימים</div><div class="feed-cbar"><div class="feed-cbar-fill" style="width:${p}%"></div></div>`;
    }
    const iJ=encodeURIComponent(JSON.stringify({id:item.id,type:item.type,title:item.title,url:item.url,description:item.description,target_date:item.target_date}));
    const link=item.url?`href="${esc(item.url)}" target="_blank"`:'';
    strip.insertAdjacentHTML('beforeend',`
      <div class="feed-card ${tc}" onclick='openFeedModal(JSON.parse(decodeURIComponent("${iJ}")))'>
        <div class="feed-card-title">${esc(item.title)}</div>
        <div class="feed-card-sub">${esc(item.description||'')}</div>
        ${extra}
      </div>`);
  });
}

function toggleMovie(i){movies[i].watched=!movies[i].watched;localStorage.setItem('moviesData',JSON.stringify(movies));renderMovies();}
function delMovie(i){movies.splice(i,1);localStorage.setItem('moviesData',JSON.stringify(movies));renderMovies();}

// ── TASK MODAL ────────────────────────────────────────────────
function openTaskModal(task){
  editTask=task||null;
  document.getElementById('task-modal-title').textContent=task?'עריכת משימה':'משימה חדשה';
  document.getElementById('t-name').value=task?.name||'';
  document.getElementById('t-desc').value=task?.description||'';
  document.getElementById('t-by').value=task?.added_by||USER_NAME;
  document.getElementById('t-opening').value=task?.opening_date?fmtD(task.opening_date):'';
  document.getElementById('t-due').value=task?.due_date?fmtD(task.due_date):'';

function renderCPills(containerId, selKey){
  const g=document.getElementById(containerId);
  if(!g)return;
  g.innerHTML=courses.map(c=>`
    <button class="cpill ${selKey===c.key?'sel':''}" data-ck="${c.key}"
      style="${selKey===c.key?`background:${c.color};border-color:${c.color};color:#fff;`:`border-color:${c.color}44;`}"
      onclick="selCPill('${containerId}','${c.key}','${c.color}')">${esc(c.short||c.name)}</button>`).join('');
}

function selCPill(cid,key,color){
  const g=document.getElementById(cid);
  if(!g)return;
  g.querySelectorAll('.cpill').forEach(b=>{
    const bc=courses.find(c=>c.key===b.dataset.ck);
    if(b.dataset.ck===key){b.classList.add('sel');b.style.background=color;b.style.borderColor=color;b.style.color='#fff';}
    else{b.classList.remove('sel');b.style.background='';b.style.borderColor=`${bc?.color||'#888'}44`;b.style.color='';}
  });
  updBadges();
}

function getSelCourse(cid){
  const g=document.getElementById(cid);
  return g?.querySelector('.cpill.sel')?.dataset.ck||null;
}

function selStatus(val){
  document.querySelectorAll('#t-status-btns .status-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===val));
}
function getSelSt(){return document.querySelector('#t-status-btns .status-btn.active')?.dataset.v||'none';}

function updBadges(){
  const ck=getSelCourse('t-courses');
  const obadge=document.getElementById('t-opening-badge');
  const dbadge=document.getElementById('t-due-badge');
  const oStr=document.getElementById('t-opening').value;
  const dStr=document.getElementById('t-due').value;
  if(oStr&&ck){const d=parseDD(oStr);if(d){const l=findOpenMatch(toYMD(d),ck);if(l){obadge.style.display='inline-flex';obadge.innerHTML=`🎓 ${esc(lessonLbl(l))}`;} else obadge.style.display='none';}}else obadge.style.display='none';
  if(dStr&&ck){const d=parseDD(dStr);if(d){const l=findDueMatch(toYMD(d),ck);if(l){dbadge.style.display='inline-flex';dbadge.innerHTML=`🎓 ${esc(lessonLbl(l))}`;} else dbadge.style.display='none';}}else dbadge.style.display='none';
}

async function saveTask(){
  const name=document.getElementById('t-name').value.trim();
  if(!name){showToast('נא למלא שם משימה');return;}
  const ck=getSelCourse('t-courses');
  const oStr=document.getElementById('t-opening').value;
  const dStr=document.getElementById('t-due').value;
  const openingDate=oStr?toYMD(parseDD(oStr)):null;
  const dueDate=dStr?toYMD(parseDD(dStr)):null;
  let olm=null,dlm=null;
  if(ck){
    if(openingDate){const l=findOpenMatch(openingDate,ck);if(l)olm=lessonLbl(l);}
    if(dueDate){const l=findDueMatch(dueDate,ck);if(l)dlm=lessonLbl(l);}
  }
  const data={
    name,course_key:ck||null,opening_date:openingDate,due_date:dueDate,
    description:document.getElementById('t-desc').value.trim()||null,
    added_by:document.getElementById('t-by').value.trim()||USER_NAME,
    status:'active',opening_lesson_match:olm,due_lesson_match:dlm,
    updated_at:firebase.firestore.FieldValue.serverTimestamp()
  };
  try{
    let tid;
    if(editTask?.id){await db.collection('tasks').doc(editTask.id).update(data);tid=editTask.id;showToast('משימה עודכנה ✓');}
    else{data.created_at=firebase.firestore.FieldValue.serverTimestamp();const r=await db.collection('tasks').add(data);tid=r.id;showToast('משימה נוספה ✓');}
    await setPS(tid,getSelSt());
    closeModal('task-ol');
  }catch(e){showToast('שגיאה בשמירה');console.error(e);}
}

async function deleteTask(){
  if(!editTask?.id)return;
  if(!confirm('למחוק את המשימה?'))return;
  try{await db.collection('tasks').doc(editTask.id).update({status:'archived'});showToast('משימה הועברה לארכיון');closeModal('task-ol');}
  catch(e){showToast('שגיאה במחיקה');}
}

// ── DATE PICKER ───────────────────────────────────────────────
function openDP(fieldId, anchor){
  dpField=fieldId;
  const v=document.getElementById(fieldId).value;
  if(v){const d=parseDD(v);if(d){dpYear=d.getFullYear();dpMonth=d.getMonth();dpSel=toYMD(d);}}
  else{const n=new Date();dpYear=n.getFullYear();dpMonth=n.getMonth();dpSel=null;}
  const ov=document.getElementById('dp-overlay');
  const rect=anchor.getBoundingClientRect();
  const top=rect.bottom+4;
  const right=Math.max(8,window.innerWidth-rect.right);
  ov.style.top=top+'px';
  ov.style.right=right+'px';
  ov.style.left='auto';
  ov.classList.add('open');
  renderDP();
}

function closeDP(){document.getElementById('dp-overlay').classList.remove('open');dpField=null;}
function dpClear(){if(dpField)document.getElementById(dpField).value='';updBadges();closeDP();}
function dpNav(d){dpMonth+=d;if(dpMonth>11){dpMonth=0;dpYear++;}if(dpMonth<0){dpMonth=11;dpYear--;}renderDP();}

function renderDP(){
  document.getElementById('dp-title').textContent=`${HEB_MONTHS[dpMonth]} ${dpYear}`;
  const grid=document.getElementById('dp-grid');
  const HDS=['א','ב','ג','ד','ה','ו','ש'];
  grid.innerHTML=HDS.map(h=>`<div class="dp-dh">${h}</div>`).join('');
  const first=new Date(dpYear,dpMonth,1);
  const last=new Date(dpYear,dpMonth+1,0);
  for(let i=0;i<first.getDay();i++)grid.insertAdjacentHTML('beforeend','<div class="dp-day dp-other"></div>');
  for(let day=1;day<=last.getDate();day++){
    const ymd=`${dpYear}-${String(dpMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const tc=isToday(new Date(ymd))?' dp-today':'';
    const sc=dpSel===ymd?' dp-sel':'';
    const lc=icsEvs.filter(ev=>isSame(ev.start,ymd+'T00:00:00')&&ev.type!=='special').length;
    const lclass=lc>=3?' dp-l3':lc===2?' dp-l2':lc===1?' dp-l1':'';
    grid.insertAdjacentHTML('beforeend',`<div class="dp-day${tc}${sc}${lclass}" onclick="dpSel2('${ymd}')">${day}</div>`);
  }
}

function dpSel2(ymd){
  dpSel=ymd;
  if(dpField){document.getElementById(dpField).value=fmtD(new Date(ymd+'T00:00:00'));updBadges();}
  const lessons=icsEvs.filter(ev=>isSame(ev.start,ymd+'T00:00:00'));
  const prev=document.getElementById('dp-preview');
  if(lessons.length>0){
    prev.innerHTML=lessons.slice(0,3).map(l=>{
      const c=getCColor(l.course_key);
      return `<div style="color:${c}">🎓 ${esc(l.title)}</div>`;
    }).join('');
  }else prev.innerHTML='<span style="color:var(--text3)">אין שיעורים</span>';
  renderDP();
}

// ── RESIZERS ─────────────────────────────────────────────────
function initResizers(){
  // Column
  const cr=document.getElementById('col-resizer');
  const rc=document.getElementById('right-col');
  let cres=false,csx,csw;
  cr.addEventListener('mousedown',e=>{cres=true;csx=e.clientX;csw=rc.offsetWidth;document.body.style.cssText='cursor:col-resize;user-select:none;';});
  document.addEventListener('mousemove',e=>{
    if(!cres)return;
    const dx=csx-e.clientX;
    rc.style.width=Math.max(220,Math.min(600,csw+dx))+'px';
  });
  document.addEventListener('mouseup',()=>{if(cres){cres=false;document.body.style.cssText='';}});

  // Horizontal: r1 = kpi-panel height
  setupHR('r1','kpi-panel',80,200,'height');
  // r2 = movies-panel height
  setupHR('r2','movies-panel',80,220,'height');
  // r3 = feed-panel height
  setupHR('r3','feed-panel',70,200,'height');
}

function setupHR(rid,tid,mn,mx,prop){
  const r=document.getElementById(rid);
  const t=document.getElementById(tid);
  if(!r||!t)return;
  let res=false,sy,sh;
  r.addEventListener('mousedown',e=>{res=true;sy=e.clientY;sh=t.offsetHeight;document.body.style.cssText='cursor:row-resize;user-select:none;';});
  document.addEventListener('mousemove',e=>{
    if(!res)return;
    const h=Math.max(mn,Math.min(mx,sh+(e.clientY-sy)));
    t.style[prop]=h+'px';
  });
  document.addEventListener('mouseup',()=>{if(res){res=false;document.body.style.cssText='';}});
}
