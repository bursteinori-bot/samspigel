name: Sync ICS Calendar

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run ICS sync
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
        run: python sync_ics.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-sync: update events from Yedion ICS"
          file_pattern: data/events.json
          commit_user_name: "sam-spiegel-bot"
          commit_user_email: "bot@samspigel.github.io"
